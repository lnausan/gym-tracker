<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gym Tracker</title>
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['"Bebas Neue"', 'cursive'],
            body: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            gym: {
              bg: '#0a0a0f',
              card: 'rgba(255,255,255,0.05)',
              border: 'rgba(255,255,255,0.10)',
              muted: 'rgba(255,255,255,0.45)',
            },
            day: {
              lunes: '#ef4444',
              martes: '#f97316',
              miercoles: '#a855f7',
              jueves: '#22c55e',
              sabado: '#3b82f6',
            }
          },
          animation: {
            'check': 'check 0.4s ease-out forwards',
            'pulse-glow': 'pulseGlow 1.5s ease-in-out infinite',
            'pr-pop': 'prPop 0.6s ease-out forwards',
            'slide-up': 'slideUp 0.3s ease-out forwards',
            'fade-in': 'fadeIn 0.2s ease-out forwards',
          },
          keyframes: {
            check: {
              '0%': { transform: 'scale(0)', opacity: '0' },
              '50%': { transform: 'scale(1.2)' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            },
            pulseGlow: {
              '0%, 100%': { boxShadow: '0 0 5px currentColor' },
              '50%': { boxShadow: '0 0 20px currentColor, 0 0 40px currentColor' },
            },
            prPop: {
              '0%': { transform: 'scale(0) rotate(-10deg)', opacity: '0' },
              '60%': { transform: 'scale(1.3) rotate(5deg)' },
              '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
          }
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0f;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] { -moz-appearance: textfield; }
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .glass-strong {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .day-glow {
      box-shadow: 0 0 15px var(--day-color, rgba(255,255,255,0.2));
    }
    .timer-flash {
      animation: timerFlash 0.5s ease-out 3;
    }
    @keyframes timerFlash {
      0%, 100% { background: rgba(255,255,255,0.05); }
      50% { background: rgba(239,68,68,0.3); }
    }
    .scroll-hide::-webkit-scrollbar { display: none; }
    .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
    /* Smooth accordion */
    .accordion-content {
      overflow: hidden;
      transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
    }
    /* Input focus glow */
    input:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--day-color, rgba(255,255,255,0.3));
    }
    /* Safe area for notch phones */
    .safe-bottom {
      padding-bottom: max(env(safe-area-inset-bottom, 0px), 12px);
    }
    /* Menos delay en toques (móvil) */
    .touch-manipulation { touch-action: manipulation; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

      storageBucket: "gym-tracker-6d918.firebasestorage.app",
      messagingSenderId: "461257443259",

    };

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

</html>
