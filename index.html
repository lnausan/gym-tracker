<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Gym Tracker</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <!-- iOS “Añadir a pantalla de inicio” exige PNG (el SVG se ignora y muestra la inicial del título). -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gym Tracker">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Sin scripts bloqueantes en head: el body puede pintar el splash de inmediato -->
  <link rel="preload" href="app.compiled.css" as="style">
  <link rel="preload" href="app.compiled.js" as="script">
  <style>
    #boot-splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0a0a0f; color: rgba(255,255,255,0.85);
      font-family: system-ui, sans-serif;
    }
    #boot-splash .t { font-size: 1.75rem; font-weight: 700; letter-spacing: 0.15em; animation: bootPulse 1.2s ease-in-out infinite; }
    #boot-splash .s { margin-top: 0.75rem; font-size: 0.8rem; color: rgba(255,255,255,0.35); }
    @keyframes bootPulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
  </style>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

  <!-- CSS: npm run build → app.compiled.css -->
  <link rel="stylesheet" href="app.compiled.css">
</head>
<body>
  <div id="root">
    <div id="boot-splash" aria-live="polite">
      <span class="t">GYM TRACKER</span>
      <span class="s">Cargando app…</span>
    </div>
  </div>

  <!-- Firebase (mismo orden; después del HTML visible para no bloquear la primera pintada) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script>
    window.FIREBASE_CONFIG = window.FIREBASE_CONFIG || {
      apiKey: "AIzaSyBGH-wHSovsA5o3zuVuyq1v-JhxCm2Wh6U",
      authDomain: "gym-tracker-6d918.firebaseapp.com",
      projectId: "gym-tracker-6d918",
      appId: "1:461257443259:web:5e150937ff3b97c935269e",
      storageBucket: "gym-tracker-6d918.firebasestorage.app",
      messagingSenderId: "461257443259",
      measurementId: "G-TJD8G1GD8K",
    };
  </script>
  <!-- React va empaquetado en app.compiled.js (menos peticiones a unpkg; mejor en Vercel) -->
  <script src="app.compiled.js"></script>
</body>
</html>
